name: Build and deploy Node.js app to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: List files (debug)
        run: ls -la

      - name: List backend folder (debug)
        run: ls -la backend/

      - name: Install dependencies
        run: cd backend && npm install --omit=dev

      - name: Zip artifact for deployment
        run: cd backend && zip -r ../release.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2A71A60E433B4F96A32CE9F678DE0F09 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E07B83A201A44232B2519BD9CFBF4583 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8A7BAECC05774146B5FA30C6A7EA6414 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'compliance-tracker'
          slot-name: 'Production'
          package: .
          
